<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GBP Inspector</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 400px;
      min-height: 500px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    
    .container {
      padding: 20px;
    }
    
    .header {
      text-align: center;
      margin-bottom: 20px;
      color: white;
    }
    
    .header h1 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 5px;
    }
    
    .header p {
      font-size: 12px;
      opacity: 0.9;
    }
    
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    
    .tab-btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .tab-btn:hover {
      background: rgba(255, 255, 255, 0.3);
    }
    
    .tab-btn.active {
      background: white;
      color: #667eea;
    }
    
    .tab-content {
      display: none;
    }
    
    .tab-content.active {
      display: block;
    }
    
    .card {
      background: white;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }
    
    .card-title {
      font-size: 14px;
      font-weight: 600;
      color: #1f2937;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .status-badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
    }
    
    .status-detected {
      background: #dcfce7;
      color: #16a34a;
    }
    
    .status-not-detected {
      background: #fee2e2;
      color: #dc2626;
    }
    
    .status-claimed {
      background: #dbeafe;
      color: #2563eb;
    }
    
    .status-unclaimed {
      background: #fef3c7;
      color: #d97706;
    }
    
    .business-name {
      font-size: 16px;
      font-weight: 700;
      color: #1f2937;
      margin-bottom: 8px;
    }
    
    .category-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid #e5e7eb;
    }
    
    .category-item:last-child {
      border-bottom: none;
    }
    
    .category-label {
      font-size: 12px;
      color: #6b7280;
      font-weight: 500;
    }
    
    .category-value {
      font-size: 13px;
      color: #1f2937;
      font-weight: 600;
      flex: 1;
    }
    
    .score-display {
      text-align: center;
      padding: 20px;
    }
    
    .score-circle {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 12px;
      font-size: 28px;
      font-weight: 700;
      color: white;
    }
    
    .score-high {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
    }
    
    .score-medium {
      background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
    }
    
    .score-low {
      background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
    }
    
    .score-label {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 4px;
    }
    
    .score-value {
      font-size: 24px;
      font-weight: 700;
      color: #1f2937;
    }
    
    .checklist {
      margin-top: 12px;
    }
    
    .checklist-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      font-size: 12px;
    }
    
    .checklist-item.pass {
      color: #16a34a;
    }
    
    .checklist-item.fail {
      color: #dc2626;
    }
    
    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 8px;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }
    
    .btn-secondary {
      background: #f3f4f6;
      color: #374151;
    }
    
    .btn-secondary:hover {
      background: #e5e7eb;
    }
    
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    
    .loading {
      text-align: center;
      padding: 40px;
      color: white;
    }
    
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 12px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .competitor-item {
      padding: 12px;
      background: #f9fafb;
      border-radius: 8px;
      margin-bottom: 8px;
    }
    
    .competitor-name {
      font-size: 14px;
      font-weight: 600;
      color: #1f2937;
      margin-bottom: 8px;
    }
    
    .competitor-categories {
      font-size: 12px;
      color: #6b7280;
    }
    
    .comparison-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    
    .comparison-table th,
    .comparison-table td {
      padding: 8px;
      text-align: left;
      border-bottom: 1px solid #e5e7eb;
    }
    
    .comparison-table th {
      font-weight: 600;
      color: #374151;
    }
    
    .comparison-table td {
      color: #6b7280;
    }
    
    .category-missing {
      color: #dc2626;
      font-weight: 600;
    }
    
    .category-present {
      color: #16a34a;
      font-weight: 600;
    }
    
    .error {
      background: #fee2e2;
      color: #dc2626;
      padding: 12px;
      border-radius: 8px;
      font-size: 12px;
      margin-bottom: 12px;
    }
    
    .no-data {
      text-align: center;
      padding: 40px 20px;
      color: white;
    }
    
    .no-data-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }
    
    .no-data p {
      font-size: 13px;
      opacity: 0.9;
      line-height: 1.5;
    }
    
    .nap-profile {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }
    
    .nap-profile-name {
      font-weight: 600;
      color: #1f2937;
      margin-bottom: 8px;
    }
    
    .nap-field {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 4px;
      word-break: break-all;
    }
    
    .nap-form {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .nap-input {
      padding: 8px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 13px;
    }
    
    .nap-input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.2);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🔍 GBP Inspector</h1>
      <p>Extract categories & quick GBP score</p>
    </div>
    
    <div class="tabs">
      <button class="tab-btn active" id="tab-audit-btn">Audit</button>
      <button class="tab-btn" id="tab-competitors-btn">Competitors</button>
      <button class="tab-btn" id="tab-nap-btn">NAP Profiles</button>
      <button class="tab-btn" id="tab-website-btn">Website SEO</button>
    </div>
    
    <div id="audit-content" class="tab-content active">
      <!-- Audit content will be injected here -->
    </div>
    
    <div id="competitors-content" class="tab-content">
      <!-- Competitors content will be injected here -->
    </div>
    
    <div id="nap-content" class="tab-content">
      <!-- NAP Profiles content will be injected here -->
    
    <div id="website-content" class="tab-content">
      <!-- Website SEO content will be injected here -->
    </div>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
